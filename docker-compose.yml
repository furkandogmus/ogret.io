version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dersplatform-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dersplatform
      POSTGRES_USER: dersplatform
      POSTGRES_PASSWORD: dersplatform
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dersplatform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dersplatform-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://postgres:5432/dersplatform
      DB_USER: dersplatform
      DB_PASSWORD: dersplatform
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-prod-jwt-secret-change-me-in-production}
    depends_on:
      - postgres
      - redis

  minio:
    image: minio/minio:latest
    container_name: dersplatform-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:

spring:
  data:
    redis:
      repositories:
        enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

app:
  jwt:
    secret: test-jwt-secret-key-that-is-at-least-256-bits-long-for-testing-purposes
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

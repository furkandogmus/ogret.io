spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Europe/Istanbul

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  forward-headers-strategy: framework
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

logging:
  level:
    root: WARN
    com.dersplatform: INFO
    org.springframework: WARN
    org.hibernate: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

app:
  upload:
    malware-scan-enabled: true
  auth:
    cookie-secure: true
  storage:
    fail-fast: true
  email:
    fail-fast: true
  cors:
    allowed-origins: ${CORS_ORIGINS:https://ogret.io,https://www.ogret.io}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

logging:
  level:
    root: INFO
    com.dersplatform: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

app:
  email:
    enabled: false
    fail-fast: false
  jwt:
    secret: ${JWT_SECRET:dersplatform-jwt-secret-key-must-be-at-least-256-bits-long}

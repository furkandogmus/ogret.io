server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  application:
    name: ders-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dersplatform}
    username: ${DB_USER:dersplatform}
    password: ${DB_PASSWORD:dersplatform}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Europe/Istanbul

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:dersplatform-jwt-secret-key-must-be-at-least-256-bits-long}
    access-token-expiration: 900000    # 15 minutes
    refresh-token-expiration: 604800000  # 7 days

  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

springdoc:
  api-docs:
    path: /api/v1/docs
  swagger-ui:
    path: /api/v1/swagger-ui.html

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://minio:9000}
    public-url: ${AWS_S3_PUBLIC_URL:http://localhost:9000}
    access-key: ${AWS_S3_ACCESS_KEY:minioadmin}
    secret-key: ${AWS_S3_SECRET_KEY:minioadminpassword}
    region: ${AWS_S3_REGION:us-east-1}
    buckets:
      public: ${AWS_S3_BUCKET_PUBLIC:dersplatform-public}
      private: ${AWS_S3_BUCKET_PRIVATE:dersplatform-private}

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: 17
  NODE_VERSION: 22

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-test-report
          path: backend/build/reports/tests/

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dersplatform
          POSTGRES_USER: dersplatform
          POSTGRES_PASSWORD: dersplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend JAR
        run: ./gradlew bootJar --no-daemon
        working-directory: backend

      - name: Start backend
        run: |
          java -jar build/libs/*.jar \
            --spring.profiles.active=dev \
            --server.port=8080 &
          timeout 120 bash -c '
            until curl -s http://localhost:8080/api/v1/subjects > /dev/null 2>&1; do
              sleep 3
            done
            echo "Backend ready"
          '
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/dersplatform
          DB_USER: dersplatform
          DB_PASSWORD: dersplatform
          REDIS_HOST: localhost
          JWT_SECRET: ci-jwt-secret-at-least-256-bits-long-for-testing

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          PWTEST_SKIP_BROWSER_DOWNLOAD: 0

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

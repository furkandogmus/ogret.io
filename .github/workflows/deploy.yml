name: Publish images and update GitOps

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      component:
        description: Component to build and deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - backend
          - frontend

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: 269174115166.dkr.ecr.eu-north-1.amazonaws.com
  GITOPS_REPOSITORY: furkandogmus/ogret.io-gitops
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Build images and deploy manifests
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Decide deployment targets
        id: targets
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_COMPONENT: ${{ inputs.component || 'all' }}
        run: |
          backend=true
          frontend=true

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            backend=false
            frontend=false
            case "$REQUESTED_COMPONENT" in
              all)
                backend=true
                frontend=true
                ;;
              backend)
                backend=true
                ;;
              frontend)
                frontend=true
                ;;
            esac
          fi

          if [ "$backend" = true ] || [ "$frontend" = true ]; then
            any=true
          else
            any=false
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "any=$any" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        if: steps.targets.outputs.any == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: steps.targets.outputs.any == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.targets.outputs.any == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        if: steps.targets.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ogret.io/backend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/ogret.io/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        if: steps.targets.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ogret.io/frontend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/ogret.io/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check out GitOps manifests
        if: steps.targets.outputs.any == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}
          path: gitops

      - name: Update immutable image tags in GitOps repository
        if: steps.targets.outputs.any == 'true'
        working-directory: gitops
        env:
          UPDATE_BACKEND: ${{ steps.targets.outputs.backend }}
          UPDATE_FRONTEND: ${{ steps.targets.outputs.frontend }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("apps/ogret/kustomization.yaml")
          content = path.read_text()
          tag = os.environ["IMAGE_TAG"]
          updates = {
              "ogret-backend": os.environ["UPDATE_BACKEND"].lower() == "true",
              "ogret-frontend": os.environ["UPDATE_FRONTEND"].lower() == "true",
          }
          for image, should_update in updates.items():
              if not should_update:
                  continue
              content, changed = re.subn(
                  rf"(name: {image}\n\s+newName: [^\n]+\n\s+newTag: )[^\n]+",
                  rf"\g<1>{tag}",
                  content,
              )
              if changed != 1:
                  raise SystemExit(f"Could not update {image} tag")
          path.write_text(content)
          PY
          git config user.name "ogret.io deploy bot"
          git config user.email "deploy-bot@users.noreply.github.com"
          git add apps/ogret/kustomization.yaml
          git diff --cached --quiet || git commit -m "deploy: ${IMAGE_TAG}"
          git push

name: Build and deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REGISTRY: 269174115166.dkr.ecr.eu-north-1.amazonaws.com
  GITOPS_REPOSITORY: furkandogmus/ogret.io-gitops
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Build images and deploy manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ogret.io/backend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/ogret.io/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ogret.io/frontend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/ogret.io/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check out GitOps manifests
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}
          path: gitops

      - name: Update immutable image tags in GitOps repository
        working-directory: gitops
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("apps/ogret/kustomization.yaml")
          content = path.read_text()
          tag = os.environ["IMAGE_TAG"]
          for image in ("ogret-backend", "ogret-frontend"):
              content, changed = re.subn(
                  rf"(name: {image}\n\s+newName: [^\n]+\n\s+newTag: )[^\n]+",
                  rf"\g<1>{tag}",
                  content,
              )
              if changed != 1:
                  raise SystemExit(f"Could not update {image} tag")
          path.write_text(content)
          PY
          git config user.name "ogret.io deploy bot"
          git config user.email "deploy-bot@users.noreply.github.com"
          git add apps/ogret/kustomization.yaml
          git diff --cached --quiet || git commit -m "deploy: ${IMAGE_TAG}"
          git push

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Apply encrypted GitHub Secrets as Kubernetes Secret
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}
        run: |
          kubectl create namespace dersplatform --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic dersplatform-secret \
            --namespace dersplatform \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=AWS_S3_ACCESS_KEY="$AWS_S3_ACCESS_KEY" \
            --from-literal=AWS_S3_SECRET_KEY="$AWS_S3_SECRET_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply GitOps manifests and wait for rollout
        run: |
          kubectl apply -k gitops/apps/ogret
          kubectl rollout status deployment/backend --namespace dersplatform --timeout=5m
          kubectl rollout status deployment/frontend --namespace dersplatform --timeout=5m

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dersplatform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dersplatform
      POSTGRES_USER: dersplatform
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: dersplatform-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/ogret/ogret.io/backend:latest}
    container_name: dersplatform-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/dersplatform
      DB_USER: dersplatform
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # TODO: Mail altyapısı hazır olunca MAIL_HOST, MAIL_USERNAME, MAIL_PASSWORD eklenmeli
      # TODO: Twilio entegrasyonu hazır olunca TWILIO_* env var'ları eklenmeli
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      AWS_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/ogret/ogret.io/frontend:latest}
    container_name: dersplatform-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M

  minio:
    image: minio/minio:latest
    container_name: dersplatform-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

volumes:
  pgdata:
  miniodata:

services:
  postgres:
    image: postgres:15-alpine
    container_name: dersplatform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dersplatform
      POSTGRES_USER: dersplatform
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: dersplatform-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/ogret/ogret.io/backend:latest}
    container_name: dersplatform-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/dersplatform
      DB_USER: dersplatform
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:?MAIL_FROM_EMAIL is required}
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      AWS_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      AWS_S3_PUBLIC_URL: ${AWS_S3_PUBLIC_URL:?AWS_S3_PUBLIC_URL is required}
      MALWARE_SCAN_ENABLED: "true"
      CLAMAV_HOST: clamav
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/ogret/ogret.io/frontend:latest}
    container_name: dersplatform-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M

  minio:
    image: minio/minio:latest
    container_name: dersplatform-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  clamav:
    image: clamav/clamav:1.4
    container_name: dersplatform-clamav
    restart: unless-stopped
    volumes:
      - clamdata:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 2m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

volumes:
  pgdata:
  miniodata:
  redisdata:
  clamdata:

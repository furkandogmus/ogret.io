apiVersion: v1
kind: Secret
metadata:
  name: ogret-gitops-repository
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: {{ required "repository.url is required" .Values.repository.url | quote }}
  sshPrivateKey: {{ required "repository.sshPrivateKey is required" .Values.repository.sshPrivateKey | quote }}

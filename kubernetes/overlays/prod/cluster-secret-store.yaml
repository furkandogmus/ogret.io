# Install this once per cluster (not part of the app overlay)
# Requires: External Secrets Operator (https://external-secrets.io)
#
# kubectl apply -f https://github.com/external-secrets/external-secrets/releases/latest/download/external-secrets.yaml
# kubectl apply -f cluster-secret-store.yaml
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-north-1
      auth:
        jwt:
          serviceAccountRef:
            name: backend
            namespace: dersplatform

{{- if .Values.secrets.externalSecret }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dersplatform-secret
  namespace: {{ include "dersplatform.namespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: dersplatform-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /ogret/prod/db
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: /ogret/prod/jwt
        property: secret
  {{- if not .Values.database.internal }}
    - secretKey: DB_URL
      remoteRef:
        key: /ogret/prod/db
        property: url
    - secretKey: DB_USER
      remoteRef:
        key: /ogret/prod/db
        property: username
  {{- end }}
  {{- if not .Values.redis.internal }}
    - secretKey: REDIS_HOST
      remoteRef:
        key: /ogret/prod/redis
        property: host
    - secretKey: REDIS_PORT
      remoteRef:
        key: /ogret/prod/redis
        property: port
  {{- end }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: dersplatform-secret
  namespace: {{ include "dersplatform.namespace" . }}
type: Opaque
stringData:
  DB_PASSWORD: dersplatform
  JWT_SECRET: local-development-jwt-secret-must-be-at-least-256-bits-long
  {{- if .Values.database.internal }}
  POSTGRES_DB: dersplatform
  POSTGRES_USER: dersplatform
  POSTGRES_PASSWORD: dersplatform
  {{- end }}
  {{- if .Values.s3.internal }}
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadminpassword
  {{- end }}
{{- end }}

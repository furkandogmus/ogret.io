apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ include "dersplatform.namespace" . }}
  labels:
    {{- include "dersplatform.labels" . | nindent 4 }}
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
  type: {{ .Values.serviceType }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "dersplatform.namespace" . }}
  labels:
    {{- include "dersplatform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: backend
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.backend.env.SPRING_PROFILES_ACTIVE }}
            - name: CORS_ORIGINS
              value: {{ .Values.backend.env.CORS_ORIGINS | quote }}
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: MAIL_FROM_EMAIL
              value: {{ .Values.aws.ses.fromEmail | quote }}
            {{- if .Values.database.internal }}
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/dersplatform
            - name: DB_USER
              value: dersplatform
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: DB_PASSWORD
            {{- else }}
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: DB_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: DB_PASSWORD
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: JWT_SECRET
            {{- if .Values.redis.internal }}
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            {{- else }}
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: REDIS_PORT
            {{- end }}
            {{- if .Values.s3.internal }}
            - name: AWS_S3_ENDPOINT
              value: http://minio:9000
            - name: AWS_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: MINIO_ROOT_USER
            - name: AWS_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dersplatform-secret
                  key: MINIO_ROOT_PASSWORD
            {{- else }}
            - name: AWS_S3_ENDPOINT
              value: https://s3.eu-north-1.amazonaws.com
            - name: AWS_S3_PUBLIC_URL
              value: https://ogret-public.s3.eu-north-1.amazonaws.com
            {{- end }}
          startupProbe:
            httpGet:
              path: {{ .Values.backend.probes.startup.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: {{ .Values.backend.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.liveness.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}

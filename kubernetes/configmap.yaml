apiVersion: v1
kind: ConfigMap
metadata:
  name: dersplatform-config
  namespace: dersplatform
data:
  SPRING_PROFILES_ACTIVE: prod
  DB_URL: jdbc:postgresql://postgres:5432/dersplatform
  DB_USER: dersplatform
  REDIS_HOST: redis
  REDIS_PORT: "6379"

  MINIO_ENDPOINT: http://minio:9000
  MINIO_BUCKET: dersplatform